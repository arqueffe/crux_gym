<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >
  <meta name="description" content="Crux Climb helps you discover routes, track sends, and level up every climbing session.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Crux Climb">
  <link rel="apple-touch-icon" href="assets/logo/logo_black.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/logo/logo_black.png"/>

  <title>Crux Climb</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --app-vh: 1vh;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100dvh;
      min-height: calc(var(--app-vh) * 100);
    }
  </style>
  <script>
    (function () {
      var lastViewportHeight = -1;
      var resizeDispatchPending = false;

      function updateAppViewportHeight() {
        var viewportHeight = window.visualViewport
          ? window.visualViewport.height
          : window.innerHeight;

        document.documentElement.style.setProperty(
          '--app-vh',
          (viewportHeight * 0.01) + 'px'
        );

        if (
          lastViewportHeight > 0 &&
          Math.abs(lastViewportHeight - viewportHeight) > 1 &&
          !resizeDispatchPending
        ) {
          // Force Flutter Web to recompute layout when mobile browser chrome changes.
          resizeDispatchPending = true;
          window.setTimeout(function () {
            resizeDispatchPending = false;
            window.dispatchEvent(new Event('resize'));
          }, 0);
        }
        lastViewportHeight = viewportHeight;
      }

      updateAppViewportHeight();
      window.addEventListener('resize', updateAppViewportHeight, {
        passive: true,
      });
      window.addEventListener('orientationchange', updateAppViewportHeight, {
        passive: true,
      });

      if (window.visualViewport) {
        window.visualViewport.addEventListener(
          'resize',
          updateAppViewportHeight,
          { passive: true }
        );
        window.visualViewport.addEventListener(
          'scroll',
          updateAppViewportHeight,
          { passive: true }
        );
      }
    })();
  </script>
  <script src="js/cookie_requests.js"></script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
